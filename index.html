<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Master Lexique Pro - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --app-height: 100dvh;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        #app {
            height: var(--app-height);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: max-width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mode Ordi : Largeur étendue */
        .app-wide {
            max-width: 1000px !important;
        }

        .card-swipe {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease, background-color 0.2s ease, max-width 0.5s ease;
            touch-action: none;
            will-change: transform, opacity;
            z-index: 10;
        }

        .swipe-right-out { transform: translateX(150vw) rotate(45deg) !important; opacity: 0 !important; }
        .swipe-left-out { transform: translateX(-150vw) rotate(-45deg) !important; opacity: 0 !important; }
        
        .card-feedback-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card-entry { animation: cardEntry 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease forwards; }

        /* Scrollbar personnalisée pour la liste alphabétique */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

    <!-- Version Tag -->
    <div class="fixed top-4 left-4 text-[10px] font-black text-slate-700 uppercase tracking-widest z-[60]">V2</div>

    <div id="app" class="max-w-md mx-auto w-full relative flex flex-col">
        
        <!-- MODAL DE CONFIRMATION -->
        <div id="modal-exit" class="hidden fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-6">

                <p class="text-slate-400 mb-8 leading-relaxed text-sm">Ta progression actuelle est sauvegardée.</p>

                    <button onclick="window.confirmExit(true)" class="w-full py-4 bg-rose-500 text-white font-bold rounded-2xl active:scale-95 transition-transform">Oui, quitter</button>
                    <button onclick="window.confirmExit(false)" class="w-full py-4 bg-slate-800 text-slate-300 font-bold rounded-2xl active:scale-95 transition-transform">Continuer</button>

            </div>
        </div>

                </div>
                <h3 class="text-lg font-bold text-white leading-none mb-1">Maîtrise Globale</h3>
                <button onclick="window.showScreen('screen-progress')" class="text-indigo-400 text-[10px] font-black uppercase tracking-widest hover:text-indigo-300 transition-colors">
                    Lexique A-Z & Progrès ➔
                </button>
            </div>

            <div class="space-y-6 mb-8 flex-grow">
                <div class="space-y-3">
                    <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest px-2">1. Choisir le sens</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-mode-classic" onclick="window.setSessionMode('termToDef')" class="flex flex-col items-center justify-center p-4 bg-indigo-600 rounded-3xl border border-indigo-500 transition-all">
                            <h4 class="font-bold text-white text-xs">Classique</h4>
                            <p class="text-[8px] text-white/60 uppercase font-black mt-1">Mot ➔ Déf</p>
                        </button>
                        <button id="btn-mode-inverse" onclick="window.setSessionMode('defToTerm')" class="flex flex-col items-center justify-center p-4 bg-slate-900 rounded-3xl border border-slate-800 transition-all">
                            <h4 class="font-bold text-white text-xs">Inverse</h4>
                            <p class="text-[8px] text-slate-500 uppercase font-black mt-1">Déf ➔ Mot</p>
                        </button>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest px-2">2. Choisir l'interface</p>
                    <div class="flex bg-slate-900 rounded-2xl p-1 border border-slate-800">

                    <div class="p-4 rounded-full bg-emerald-500/40 text-emerald-500 border border-emerald-500/50">✓</div>

                        <div id="answer-box" class="hidden pt-8 border-t border-slate-800/50 fade-in">

                    </div>
                </div>
            </div>

            <div id="game-controls" class="pt-6 shrink-0 pb-4">

                </button>
                
                <div id="ordi-controls" class="hidden grid grid-cols-2 gap-4 mt-2 fade-in">

                    <button onclick="window.processValidation(true)" class="py-5 bg-emerald-500/20 text-emerald-500 font-black uppercase text-[11px] tracking-widest rounded-2xl border border-emerald-500/30 active:scale-95 transition-all hover:bg-emerald-500/30">C'est Juste (V)</button>

                        <span class="text-emerald-500/70">Juste →</span>

            { id: "98", term: "NCA / NCR", def: "Non-Consommateur Absolu ou Relatif." },
            { id: "99", term: "Omnicanalité", def: "Synergie de tous les points de contact." },
            { id: "100", term: "POEM", def: "Paid, Owned, Earned Media." },
            { id: "101", term: "Pénétration", def: "Prix bas pour toucher un max de clients." },
            { id: "102", term: "Perception", def: "Interprétation via les cinq sens." },
            { id: "103", term: "Persona", def: "Profil type fictif d'un client cible." },
            { id: "104", term: "Phygitalisation", def: "Fusion du physique et du digital." },
            { id: "105", term: "Planogramme", def: "Schéma de la place des références." },
            { id: "106", term: "Positionnement", def: "Place dans l'esprit du client face aux concurrents." },
            { id: "107", term: "Prix psychologique", def: "Prix d'acceptabilité maximale." },
            { id: "108", term: "Processus d'achat", def: "Besoin, Info, Comparaison, Décision, Évaluation." },
            { id: "109", term: "Produit", def: "Bien ou service proposé pour satisfaire un besoin contre un prix." },
            { id: "110", term: "Profondeur", def: "Nombre de références par famille de produits." },
            { id: "111", term: "PLV", def: "Publicité sur le Lieu de Vente." },
            { id: "112", term: "RGPD", def: "Protection des données personnelles." },
            { id: "113", term: "Rentabilité", def: "Capacité à dégager des bénéfices." },
            { id: "114", term: "Résultat", def: "Ressources restant après charges." },
            { id: "115", term: "Retargeting", def: "Publicité reciblée selon le parcours." },
            { id: "116", term: "Rétroplanning", def: "Planification à partir de la fin." },
            { id: "117", term: "SEA / SEO / SEM", def: "Référencement moteurs." },
            { id: "118", term: "Seuil de rentabilité", def: "CA minimal pour ne plus perdre d'argent." },
            { id: "119", term: "SRP", def: "Seuil de Revente à Perte." },
            { id: "120", term: "Signes de qualité", def: "Logos officiels (AOP, Label Rouge)." },
            { id: "121", term: "Social commerce", def: "Vente via réseaux sociaux." },
            { id: "122", term: "Sourcing", def: "Recherche et évaluation fournisseurs." },
            { id: "123", term: "Taux de clic", def: "Clics / Affichages." },
            { id: "124", term: "Taux de marque", def: "Marge / Prix de vente HT." },
            { id: "125", term: "Taux de rebond", def: "Sortie après une seule page." },
            { id: "126", term: "T-commerce", def: "Achats via TV connectée." },
            { id: "127", term: "Trade marketing", def: "Actions communes fabricant/distributeur." },
            { id: "128", term: "Up-selling", def: "Montée en gamme lors de l'achat." },
            { id: "129", term: "V-commerce", def: "Vente via réalité virtuelle." },
            { id: "130", term: "Yield management", def: "Prix variant selon la demande." },
            { id: "131", term: "Zone de chalandise", def: "Aire d'attraction du point de vente." },
            { id: "132", term: "Zone chaude / froide", def: "Zones fréquentées ou non du magasin." }
        ];

        let userStats = {};
        let currentSession = [];
        let sessionIndex = 0;
        let sessionResults = { correct: 0, wrong: 0 };
        let sessionMode = 'termToDef';
        let inputMethod = 'swipe';

        let startX = 0, currentX = 0, isDragging = false;
        const appContainer = document.getElementById('app');
        const card = document.getElementById('card-element');
        const cardOverlay = document.getElementById('card-overlay');
        const swipeHints = document.getElementById('swipe-hints');
        const displayText = document.getElementById('display-text');
        const answerText = document.getElementById('answer-text');

        window.setMethod = (m) => {
            inputMethod = m;
            document.getElementById('toggle-swipe').className = m === 'swipe' ? "flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all bg-indigo-600 text-white" : "flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all text-slate-400";
            document.getElementById('toggle-buttons').className = m === 'buttons' ? "flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all bg-indigo-600 text-white" : "flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all text-slate-400";
            appContainer.classList.toggle('app-wide', m === 'buttons');
        };

        window.setSessionMode = (m) => {
            sessionMode = m;
            document.getElementById('btn-mode-classic').className = m === 'termToDef' ? "flex flex-col items-center justify-center p-4 bg-indigo-600 rounded-3xl border border-indigo-500 transition-all" : "flex flex-col items-center justify-center p-4 bg-slate-900 rounded-3xl border border-slate-800 transition-all";
            document.getElementById('btn-mode-inverse').className = m === 'defToTerm' ? "flex flex-col items-center justify-center p-4 bg-indigo-600 rounded-3xl border border-indigo-500 transition-all" : "flex flex-col items-center justify-center p-4 bg-slate-900 rounded-3xl border border-slate-800 transition-all";
        };

        window.showScreen = (id) => {
            ['loading', 'screen-home', 'screen-game', 'screen-summary', 'screen-progress'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'screen-progress') updateProgressUI();
            if (id === 'screen-home') {
                updateHomeUI();
                appContainer.classList.remove('app-wide');
            }
            if (id === 'screen-game' && inputMethod === 'buttons') appContainer.classList.add('app-wide');
        };

        const updateHomeUI = () => {
            const N = rawLexicon.length;
            let totalWordMastery = 0;
            rawLexicon.forEach(t => {
                const s = userStats[t.id] || { c: 0, w: 0 };
                // Courbe logarithmique : gros gain au début, stagne vers la fin
                const wordPoints = s.c > 0 ? (1 - Math.pow(0.7, s.c)) : 0;
                totalWordMastery += wordPoints;
            });
            const percentage = Math.round((totalWordMastery / N) * 100);
            document.getElementById('global-mastery').innerText = `${percentage}%`;
            document.getElementById('mastery-circle').style.strokeDashoffset = 276 - (276 * percentage / 100);
        };

        const updateProgressUI = () => {
            const list = document.getElementById('progress-list');
            list.innerHTML = '';
            // TRI ALPHABÉTIQUE
            [...rawLexicon].sort((a,b) => a.term.localeCompare(b.term)).forEach(item => {
                const s = userStats[item.id] || { c: 0, w: 0 };
                const wordPoints = s.c > 0 ? (1 - Math.pow(0.7, s.c)) : 0;
                const ratio = Math.round(wordPoints * 100);
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-900 rounded-2xl border border-slate-800 flex flex-col gap-1";
                div.innerHTML = `<div class="flex justify-between items-start"><h4 class="font-bold text-white text-[11px]">${item.term}</h4><span class="text-[8px] font-black text-indigo-500 uppercase tracking-tighter">${ratio}%</span></div><p class="text-slate-500 text-[10px] leading-tight italic">${item.def}</p>`;
                list.appendChild(div);
            });
        };

        window.startSession = () => {
            sessionIndex = 0; sessionResults = { correct: 0, wrong: 0 };
            const scored = rawLexicon.map(item => {
                const s = userStats[item.id] || { c: 0, w: 0 };
                const mastered = (1 - Math.pow(0.7, s.c)) > 0.9;
                return { ...item, p: (s.w + 1) / (s.c + 0.5), isMastered: mastered };
            });
            const toLearn = scored.filter(i => !i.isMastered).sort((a,b) => b.p - a.p).slice(0, 18);
            const toReview = scored.filter(i => i.isMastered).sort(() => Math.random() - 0.5).slice(0, 7);
            currentSession = [...toLearn, ...toReview].sort(() => Math.random() - 0.5);
            window.showScreen('screen-game');
            updateQuestionUI();
        };

        const updateQuestionUI = () => {
            const item = currentSession[sessionIndex];
            const stats = userStats[item.id] || { c: 0, w: 0 };
            card.classList.remove('swipe-right-out', 'swipe-left-out', 'animate-card-entry');
            card.style.transform = "translateX(0) rotate(0) scale(1)"; card.style.opacity = "1"; cardOverlay.style.opacity = "0";
            void card.offsetWidth; card.classList.add('animate-card-entry');
            document.getElementById('question-counter').innerText = `${sessionIndex+1}/${currentSession.length}`;
            document.getElementById('session-progress-bar').style.width = `${(sessionIndex / currentSession.length) * 100}%`;
            document.getElementById('historical-stats').innerHTML = `<span class="text-[9px] font-bold text-emerald-500/50">${stats.c} ✓</span> <span class="text-[9px] font-bold text-rose-500/50">${stats.w} ✕</span>`;
            
            // Adaptation taille texte Ordi
            const isOrdi = inputMethod === 'buttons';
            displayText.className = isOrdi ? "text-4xl font-black text-white leading-tight" : "text-xl font-bold text-white leading-tight";
            answerText.className = isOrdi ? "text-2xl text-slate-400 italic leading-relaxed" : "text-base text-slate-400 italic leading-relaxed";

            displayText.innerText = sessionMode === 'termToDef' ? item.term : item.def;
            answerText.innerText = sessionMode === 'termToDef' ? item.def : item.term;
            document.getElementById('answer-box').classList.add('hidden');
            document.getElementById('btn-reveal').classList.remove('hidden');
            document.getElementById('ordi-controls').classList.add('hidden');
            document.getElementById('swipe-instruction').classList.add('hidden');
            isDragging = false; startX = 0; currentX = 0;
        };

        window.revealAnswer = () => {
            document.getElementById('answer-box').classList.remove('hidden');
            document.getElementById('btn-reveal').classList.add('hidden');
            if (inputMethod === 'swipe') document.getElementById('swipe-instruction').classList.remove('hidden');
            else document.getElementById('ordi-controls').classList.remove('hidden');
        };

        window.processValidation = async (isCorrect) => {
            const item = currentSession[sessionIndex];
            if (!userStats[item.id]) userStats[item.id] = { c: 0, w: 0 };
            if (isCorrect) { userStats[item.id].c++; sessionResults.correct++; }
            else { userStats[item.id].w++; sessionResults.wrong++; }
            if (db && auth?.currentUser) setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'statistics', 'v1'), { stats: userStats }, { merge: true }).catch(()=>{});
            localStorage.setItem('lexique_stats_v2', JSON.stringify(userStats));
            sessionIndex++;
            setTimeout(() => {
                if (sessionIndex < currentSession.length) updateQuestionUI();
                else {
                    document.getElementById('summary-correct').innerText = sessionResults.correct;
                    document.getElementById('summary-wrong').innerText = sessionResults.wrong;
                    window.showScreen('screen-summary');
                }
            }, 300);
        };

        window.exitSession = () => document.getElementById('modal-exit').classList.remove('hidden');
        window.confirmExit = (s) => { document.getElementById('modal-exit').classList.add('hidden'); if(s) window.showScreen('screen-home'); };

        const hS = (e) => { if (inputMethod !== 'swipe' || document.getElementById('answer-box').classList.contains('hidden')) return; isDragging = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; currentX = startX; card.style.transition = "none"; card.classList.remove('animate-card-entry'); };
        const hM = (e) => { if (!isDragging) return; currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; const dx = currentX - startX; card.style.transform = `translateX(${dx}px) rotate(${dx/25}deg)`; swipeHints.style.opacity = Math.min(Math.abs(dx)/80, 1); swipeHints.querySelector('.p-4').parentElement.style.opacity = dx < 0 ? 1 : 0; swipeHints.querySelector('.p-4:last-child').parentElement.style.opacity = dx > 0 ? 1 : 0; cardOverlay.style.opacity = Math.min(Math.abs(dx)/200, 0.3); cardOverlay.style.backgroundColor = dx > 0 ? "#10b981" : "#f43f5e"; if (Math.abs(dx)>10 && e.cancelable) e.preventDefault(); };
        const hE = () => { if (!isDragging) return; isDragging = false; const dx = currentX - startX; card.style.transition = "transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease"; swipeHints.style.opacity = "0"; cardOverlay.style.opacity = "0"; if (dx > 80) { card.classList.add('swipe-right-out'); window.processValidation(true); } else if (dx < -80) { card.classList.add('swipe-left-out'); window.processValidation(false); } else { card.style.transform = "translateX(0) rotate(0)"; } };

        card.addEventListener('mousedown', hS); card.addEventListener('touchstart', hS, { passive: true });
        window.addEventListener('mousemove', hM); window.addEventListener('touchmove', hM, { passive: false });
        window.addEventListener('mouseup', hE); window.addEventListener('touchend', hE);

        window.onload = async () => {
            if (auth) {
                const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                if (token) await signInWithCustomToken(auth, token).catch(() => signInAnonymously(auth));
                else await signInAnonymously(auth);
                onAuthStateChanged(auth, async (u) => { 
                    if (u) {
                        const d = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'statistics', 'v1'));
                        if (d.exists()) userStats = d.data().stats || {};
                    } else { const l = localStorage.getItem('lexique_stats_v2'); if(l) userStats = JSON.parse(l); }
                    window.showScreen('screen-home');
                });
            } else { const l = localStorage.getItem('lexique_stats_v2'); if(l) userStats = JSON.parse(l); window.showScreen('screen-home'); }
        };
    </script>
</body>
</html>
